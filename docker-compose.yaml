version: '3.8'
services:
  app:
    build: .
    container_name: app_php
    restart: unless-stopped
    env_file: .env
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - php_network

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - php_network

  db:
    image: mysql:latest
    container_name: db
    restart: unless-stopped
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - php_network
networks:
  php_network:
    driver: bridge
volumes:
  mysql_data: